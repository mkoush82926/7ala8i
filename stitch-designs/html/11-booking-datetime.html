<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Lumina - Pick Date &amp; Time</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "on-secondary-fixed": "#0d1c2e",
              "primary-fixed": "#dde2f6",
              "primary-fixed-dim": "#c1c6d9",
              "inverse-surface": "#2d3133",
              "outline-variant": "#c6c6cc",
              "on-primary-container": "#7e8395",
              "surface-tint": "#585e6f",
              "on-error-container": "#93000a",
              "surface-variant": "#e0e3e5",
              "on-background": "#191c1e",
              "on-secondary-fixed-variant": "#3a485b",
              "on-tertiary-container": "#a17f3b",
              "on-primary": "#ffffff",
              "secondary-fixed-dim": "#b9c7df",
              "surface-bright": "#f7f9fb",
              "on-primary-fixed": "#151b29",
              "inverse-primary": "#c1c6d9",
              "tertiary": "#000000",
              "surface-container-high": "#e6e8ea",
              "surface-container-lowest": "#ffffff",
              "secondary-container": "#d5e3fc",
              "surface-dim": "#d8dadc",
              "secondary": "#515f74",
              "on-surface": "#191c1e",
              "tertiary-fixed-dim": "#e9c176",
              "error-container": "#ffdad6",
              "secondary-fixed": "#d5e3fc",
              "on-secondary": "#ffffff",
              "tertiary-container": "#261900",
              "on-tertiary-fixed-variant": "#5d4201",
              "error": "#ba1a1a",
              "tertiary-fixed": "#ffdea5",
              "surface-container-low": "#f2f4f6",
              "primary-container": "#151b29",
              "inverse-on-surface": "#eff1f3",
              "primary": "#000000",
              "surface-container-highest": "#e0e3e5",
              "surface-container": "#eceef0",
              "on-tertiary": "#ffffff",
              "on-surface-variant": "#45464c",
              "on-error": "#ffffff",
              "outline": "#76777d",
              "on-tertiary-fixed": "#261900",
              "on-primary-fixed-variant": "#414756",
              "background": "#f7f9fb",
              "on-secondary-container": "#57657a",
              "surface": "#f7f9fb"
            },
            fontFamily: {
              "headline": ["Manrope"],
              "body": ["Inter"],
              "label": ["Inter"]
            },
            borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>
<body class="bg-background text-on-background font-body antialiased">
<!-- Top Navigation (Shell Suprpressed for Transactional Journey but Brand Presence Kept) -->
<header class="fixed top-0 w-full z-50 bg-white dark:bg-[#121826] h-20">
<div class="flex justify-between items-center max-w-7xl mx-auto px-6 h-full">
<div class="text-2xl font-bold tracking-tighter text-black dark:text-white font-headline">Lumina</div>
<div class="flex items-center gap-4">
<button class="flex items-center gap-2 text-neutral-500 hover:text-black transition-colors font-medium text-sm">
<span class="material-symbols-outlined text-lg">close</span>
<span>Cancel</span>
</button>
</div>
</div>
</header>
<main class="pt-32 pb-40 px-6 max-w-4xl mx-auto">
<!-- Progress Header -->
<div class="mb-12">
<div class="flex items-center justify-between mb-6">
<button class="flex items-center gap-2 text-on-surface-variant hover:text-primary transition-all active:scale-95">
<span class="material-symbols-outlined">arrow_back</span>
<span class="font-semibold text-sm">Back</span>
</button>
<span class="text-sm font-bold tracking-widest text-on-primary-container uppercase">Step 4 of 4</span>
</div>
<h1 class="font-headline text-4xl font-extrabold tracking-tight text-primary mb-2">Schedule your session</h1>
<p class="text-on-surface-variant text-lg">Select a date and time that fits your boutique experience.</p>
</div>
<div class="space-y-12">
<!-- Date Selection Row -->
<section>
<div class="flex items-center justify-between mb-4">
<h3 class="font-headline text-xl font-bold">Select Date</h3>
<span class="text-sm text-on-surface-variant font-medium">October 2023</span>
</div>
<div class="relative">
<div class="flex gap-3 overflow-x-auto no-scrollbar pb-4 -mx-2 px-2 scroll-smooth">
<!-- Active Date Card -->
<button class="flex-shrink-0 w-20 h-28 flex flex-col items-center justify-center bg-primary text-white rounded-xl shadow-lg transition-transform active:scale-95">
<span class="text-xs font-bold uppercase tracking-widest opacity-80 mb-1">Mon</span>
<span class="text-2xl font-black">23</span>
</button>
<!-- Available Date Cards -->
<button class="flex-shrink-0 w-20 h-28 flex flex-col items-center justify-center bg-surface-container-lowest text-on-surface rounded-xl hover:bg-surface-container-low transition-all active:scale-95">
<span class="text-xs font-bold uppercase tracking-widest text-on-surface-variant mb-1">Tue</span>
<span class="text-2xl font-bold">24</span>
</button>
<button class="flex-shrink-0 w-20 h-28 flex flex-col items-center justify-center bg-surface-container-lowest text-on-surface rounded-xl hover:bg-surface-container-low transition-all active:scale-95">
<span class="text-xs font-bold uppercase tracking-widest text-on-surface-variant mb-1">Wed</span>
<span class="text-2xl font-bold">25</span>
</button>
<button class="flex-shrink-0 w-20 h-28 flex flex-col items-center justify-center bg-surface-container-lowest text-on-surface rounded-xl hover:bg-surface-container-low transition-all active:scale-95">
<span class="text-xs font-bold uppercase tracking-widest text-on-surface-variant mb-1">Thu</span>
<span class="text-2xl font-bold">26</span>
</button>
<button class="flex-shrink-0 w-20 h-28 flex flex-col items-center justify-center bg-surface-container-lowest text-on-surface rounded-xl hover:bg-surface-container-low transition-all active:scale-95">
<span class="text-xs font-bold uppercase tracking-widest text-on-surface-variant mb-1">Fri</span>
<span class="text-2xl font-bold">27</span>
</button>
<button class="flex-shrink-0 w-20 h-28 flex flex-col items-center justify-center bg-surface-container-lowest text-on-surface rounded-xl hover:bg-surface-container-low transition-all active:scale-95">
<span class="text-xs font-bold uppercase tracking-widest text-on-surface-variant mb-1">Sat</span>
<span class="text-2xl font-bold">28</span>
</button>
<button class="flex-shrink-0 w-20 h-28 flex flex-col items-center justify-center bg-surface-container-lowest text-on-surface rounded-xl hover:bg-surface-container-low transition-all active:scale-95 opacity-50">
<span class="text-xs font-bold uppercase tracking-widest text-on-surface-variant mb-1">Sun</span>
<span class="text-2xl font-bold">29</span>
</button>
<button class="flex-shrink-0 w-20 h-28 flex flex-col items-center justify-center bg-surface-container-lowest text-on-surface rounded-xl hover:bg-surface-container-low transition-all active:scale-95">
<span class="text-xs font-bold uppercase tracking-widest text-on-surface-variant mb-1">Mon</span>
<span class="text-2xl font-bold">30</span>
</button>
<button class="flex-shrink-0 w-20 h-28 flex flex-col items-center justify-center bg-surface-container-lowest text-on-surface rounded-xl hover:bg-surface-container-low transition-all active:scale-95">
<span class="text-xs font-bold uppercase tracking-widest text-on-surface-variant mb-1">Tue</span>
<span class="text-2xl font-bold">31</span>
</button>
</div>
</div>
</section>
<!-- Time Selection Grid -->
<section>
<div class="flex items-center justify-between mb-6">
<h3 class="font-headline text-xl font-bold">Available Times</h3>
<div class="flex gap-4">
<div class="flex items-center gap-1.5 text-xs font-semibold text-on-surface-variant">
<div class="w-3 h-3 rounded-full bg-surface-container-lowest border border-outline-variant"></div>
<span>Free</span>
</div>
<div class="flex items-center gap-1.5 text-xs font-semibold text-on-surface-variant">
<div class="w-3 h-3 rounded-full bg-primary"></div>
<span>Selected</span>
</div>
</div>
</div>
<!-- 4 Column Grid -->
<div class="grid grid-cols-2 md:grid-cols-4 gap-3">
<!-- Morning Sessions -->
<div class="col-span-full mt-4 mb-2 text-xs font-bold uppercase tracking-widest text-outline">Morning</div>
<button class="py-4 px-6 bg-surface-container-lowest text-on-surface rounded-lg font-semibold text-center hover:bg-primary-fixed transition-all border border-transparent active:scale-95">9:00 AM</button>
<button class="py-4 px-6 bg-surface-container-lowest text-on-surface rounded-lg font-semibold text-center hover:bg-primary-fixed transition-all border border-transparent active:scale-95">9:30 AM</button>
<button class="py-4 px-6 bg-surface-container-low text-on-surface-variant rounded-lg font-semibold text-center cursor-not-allowed opacity-40 line-through relative group">
                        10:00 AM
                    </button>
<button class="py-4 px-6 bg-primary text-on-primary rounded-lg font-bold text-center shadow-lg transition-all scale-105">
                        10:30 AM
                    </button>
<button class="py-4 px-6 bg-surface-container-lowest text-on-surface rounded-lg font-semibold text-center hover:bg-primary-fixed transition-all border border-transparent active:scale-95">11:00 AM</button>
<button class="py-4 px-6 bg-surface-container-low text-on-surface-variant rounded-lg font-semibold text-center cursor-not-allowed opacity-40 line-through">11:30 AM</button>
<!-- Afternoon Sessions -->
<div class="col-span-full mt-6 mb-2 text-xs font-bold uppercase tracking-widest text-outline">Afternoon</div>
<button class="py-4 px-6 bg-surface-container-lowest text-on-surface rounded-lg font-semibold text-center hover:bg-primary-fixed transition-all border border-transparent active:scale-95">12:00 PM</button>
<button class="py-4 px-6 bg-surface-container-lowest text-on-surface rounded-lg font-semibold text-center hover:bg-primary-fixed transition-all border border-transparent active:scale-95">1:30 PM</button>
<button class="py-4 px-6 bg-surface-container-lowest text-on-surface rounded-lg font-semibold text-center hover:bg-primary-fixed transition-all border border-transparent active:scale-95">2:00 PM</button>
<button class="py-4 px-6 bg-surface-container-lowest text-on-surface rounded-lg font-semibold text-center hover:bg-primary-fixed transition-all border border-transparent active:scale-95">2:30 PM</button>
<button class="py-4 px-6 bg-surface-container-lowest text-on-surface rounded-lg font-semibold text-center hover:bg-primary-fixed transition-all border border-transparent active:scale-95">3:00 PM</button>
<button class="py-4 px-6 bg-surface-container-low text-on-surface-variant rounded-lg font-semibold text-center cursor-not-allowed opacity-40 line-through">3:30 PM</button>
<button class="py-4 px-6 bg-surface-container-lowest text-on-surface rounded-lg font-semibold text-center hover:bg-primary-fixed transition-all border border-transparent active:scale-95">4:00 PM</button>
<button class="py-4 px-6 bg-surface-container-lowest text-on-surface rounded-lg font-semibold text-center hover:bg-primary-fixed transition-all border border-transparent active:scale-95">4:30 PM</button>
<button class="py-4 px-6 bg-surface-container-lowest text-on-surface rounded-lg font-semibold text-center hover:bg-primary-fixed transition-all border border-transparent active:scale-95">5:00 PM</button>
<button class="py-4 px-6 bg-surface-container-lowest text-on-surface rounded-lg font-semibold text-center hover:bg-primary-fixed transition-all border border-transparent active:scale-95">5:30 PM</button>
</div>
</section>
</div>
</main>
<!-- Fixed Bottom Action Bar -->
<footer class="fixed bottom-0 left-0 w-full bg-white/80 backdrop-blur-xl border-t border-surface-container shadow-[0_-4px_40px_rgba(0,0,0,0.04)] z-50">
<div class="max-w-4xl mx-auto px-6 h-24 flex items-center justify-between">
<div class="hidden md:block">
<p class="text-xs font-bold uppercase tracking-widest text-on-surface-variant mb-0.5">Selected Slot</p>
<p class="font-headline font-bold text-primary">Monday, Oct 23 • 10:30 AM</p>
</div>
<div class="w-full md:w-auto flex gap-4">
<button class="flex-1 md:flex-none px-10 h-14 bg-primary text-on-primary font-bold rounded-lg flex items-center justify-center gap-2 hover:opacity-90 transition-all active:scale-95 shadow-lg shadow-primary/10">
<span>Next</span>
<span class="material-symbols-outlined">arrow_forward</span>
</button>
</div>
</div>
</footer>
<!-- Side Decoration (Digital Atelier Feel) -->
<div class="fixed top-1/2 -right-20 -translate-y-1/2 opacity-[0.03] pointer-events-none select-none hidden lg:block">
<span class="font-headline font-black text-[20rem] tracking-tighter transform rotate-90 inline-block text-primary">LUMINA</span>
</div>
</body></html>
