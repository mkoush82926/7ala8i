<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Lumina - Sign In</title>
<!-- Fonts -->
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&amp;family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<!-- Material Symbols -->
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "on-secondary-fixed-variant": "#3a485b",
              "surface-tint": "#585e6f",
              "on-error-container": "#93000a",
              "surface-variant": "#e0e3e5",
              "on-background": "#191c1e",
              "primary-fixed-dim": "#c1c6d9",
              "inverse-surface": "#2d3133",
              "on-primary-container": "#7e8395",
              "outline-variant": "#e2e8f0",
              "on-secondary-fixed": "#0d1c2e",
              "primary-fixed": "#dde2f6",
              "secondary-container": "#d5e3fc",
              "surface-container-high": "#f8fafc",
              "surface-container-lowest": "#ffffff",
              "secondary-fixed-dim": "#b9c7df",
              "on-primary-fixed": "#151b29",
              "surface-bright": "#ffffff",
              "inverse-primary": "#c1c6d9",
              "tertiary": "#000000",
              "on-tertiary-container": "#a17f3b",
              "on-primary": "#ffffff",
              "on-tertiary": "#ffffff",
              "on-surface-variant": "#64748b",
              "error": "#ba1a1a",
              "on-tertiary-fixed-variant": "#5d4201",
              "primary-container": "#151b29",
              "surface-container-low": "#ffffff",
              "inverse-on-surface": "#eff1f3",
              "tertiary-fixed": "#ffdea5",
              "primary": "#000000",
              "surface-container-highest": "#f1f5f9",
              "surface-container": "#f8fafc",
              "on-secondary": "#ffffff",
              "secondary-fixed": "#d5e3fc",
              "tertiary-container": "#261900",
              "surface-dim": "#f1f5f9",
              "secondary": "#515f74",
              "on-surface": "#0f172a",
              "error-container": "#ffdad6",
              "tertiary-fixed-dim": "#e9c176",
              "surface": "#ffffff",
              "background": "#ffffff",
              "on-secondary-container": "#57657a",
              "on-tertiary-fixed": "#261900",
              "on-primary-fixed-variant": "#414756",
              "on-error": "#ffffff",
              "outline": "#e2e8f0"
            },
            fontFamily: {
              "headline": ["Plus Jakarta Sans", "Inter", "sans-serif"],
              "body": ["Inter", "sans-serif"],
              "label": ["Inter", "sans-serif"]
            },
            borderRadius: {"DEFAULT": "0.375rem", "lg": "0.75rem", "xl": "1rem", "2xl": "1.5rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
        }
        .minimal-input {
            border: 1px solid #f1f5f9;
            background-color: #f8fafc;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .minimal-input:focus {
            background-color: #ffffff;
            border-color: #000000;
            box-shadow: 0 0 0 1px #000000;
        }
    </style>
</head>
<body class="bg-surface text-on-surface font-body selection:bg-primary/10 selection:text-primary antialiased">
<!-- TopNavBar -->
<nav class="flex justify-between items-center w-full px-12 h-20 sticky top-0 z-50 bg-white/80 backdrop-blur-md">
<div class="flex items-center gap-2">
<span class="text-xl font-bold tracking-tight text-[#0f172a] font-headline">Lumina</span>
</div>
<div class="flex items-center gap-8">
<div class="flex items-center gap-6">
<button class="text-on-surface/40 hover:text-primary transition-colors">
<span class="material-symbols-outlined text-[20px]" data-icon="language">language</span>
</button>
<button class="text-on-surface/40 hover:text-primary transition-colors">
<span class="material-symbols-outlined text-[20px]" data-icon="light_mode">light_mode</span>
</button>
</div>
<button class="font-headline font-semibold text-xs uppercase tracking-widest text-primary hover:opacity-70 transition-opacity">
                Get Started
            </button>
</div>
</nav>
<main class="min-h-[calc(100vh-80px)] flex items-center justify-center p-12 bg-white">
<!-- Minimal Login Card -->
<div class="w-full max-w-xl">
<div class="bg-white rounded-2xl border border-slate-100 p-12 md:p-20 shadow-[0_32px_64px_-16px_rgba(0,0,0,0.05)]">
<!-- Brand Anchor -->
<div class="flex flex-col items-center mb-16">
<div class="w-10 h-10 bg-primary flex items-center justify-center rounded-lg mb-8">
<span class="material-symbols-outlined text-on-primary text-xl" data-icon="diamond" style="font-variation-settings: 'FILL' 1;">diamond</span>
</div>
<h1 class="font-headline text-3xl font-light tracking-tight text-on-surface mb-3">Welcome back</h1>
<p class="text-on-surface-variant font-body text-sm font-light tracking-wide">Enter your details to access your studio.</p>
</div>
<!-- Form Section -->
<form class="space-y-8">
<!-- Email Input -->
<div class="space-y-3">
<label class="block text-[10px] font-bold uppercase tracking-[0.2em] text-on-surface-variant/80 ml-1" for="email">Email Address</label>
<input class="minimal-input w-full h-14 px-5 rounded-xl text-on-surface placeholder:text-slate-300 focus:ring-0 outline-none font-body text-sm" id="email" placeholder="name@domain.com" type="email"/>
</div>
<!-- Password Input -->
<div class="space-y-3">
<div class="flex justify-between items-center ml-1">
<label class="block text-[10px] font-bold uppercase tracking-[0.2em] text-on-surface-variant/80" for="password">Password</label>
<a class="text-[10px] font-bold uppercase tracking-widest text-on-surface-variant/60 hover:text-primary transition-colors" href="#">Forgot?</a>
</div>
<div class="relative">
<input class="minimal-input w-full h-14 px-5 rounded-xl text-on-surface placeholder:text-slate-300 focus:ring-0 outline-none font-body text-sm" id="password" placeholder="••••••••" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-on-surface-variant/40 hover:text-on-surface transition-colors p-1" type="button">
<span class="material-symbols-outlined text-[18px]" data-icon="visibility">visibility</span>
</button>
</div>
</div>
<!-- Options -->
<div class="flex items-center gap-3 ml-1 pt-2">
<input class="w-4 h-4 rounded-sm border-slate-200 text-primary focus:ring-primary/20 transition-all cursor-pointer" id="remember" type="checkbox"/>
<label class="text-xs font-body text-on-surface-variant/80 cursor-pointer select-none" for="remember">Keep me signed in</label>
</div>
<!-- Sign In Button -->
<div class="pt-4">
<button class="w-full h-14 bg-primary text-on-primary font-headline font-semibold rounded-xl hover:bg-zinc-800 active:scale-[0.99] transition-all flex items-center justify-center gap-3 text-sm tracking-wide" type="submit">
<span>Sign In</span>
<span class="material-symbols-outlined text-[16px]" data-icon="arrow_forward">arrow_forward</span>
</button>
</div>
</form>
<!-- Footer Link -->
<div class="mt-12 text-center">
<p class="font-body text-xs text-on-surface-variant/60">
                        New to Lumina? 
                        <a class="font-bold text-primary hover:opacity-70 ml-1 transition-all" href="#">Create an account</a>
</p>
</div>
</div>
</div>
</main>
<!-- Simple Footer -->
<footer class="w-full py-16 px-12 bg-white border-t border-slate-50">
<div class="grid grid-cols-2 md:grid-cols-4 gap-12 max-w-7xl mx-auto">
<div class="col-span-2 md:col-span-1">
<span class="text-base font-bold text-on-surface font-headline mb-6 block">Lumina</span>
<p class="font-body text-[10px] uppercase tracking-[0.2em] text-on-surface-variant/40 leading-relaxed">
                    © 2024 Lumina Digital.
                </p>
</div>
<div>
<h4 class="font-headline text-[10px] uppercase tracking-[0.2em] text-on-surface font-bold mb-6">Product</h4>
<ul class="space-y-3">
<li><a class="font-body text-[11px] text-on-surface-variant/60 hover:text-primary transition-colors" href="#">Features</a></li>
<li><a class="font-body text-[11px] text-on-surface-variant/60 hover:text-primary transition-colors" href="#">Solutions</a></li>
</ul>
</div>
<div>
<h4 class="font-headline text-[10px] uppercase tracking-[0.2em] text-on-surface font-bold mb-6">Company</h4>
<ul class="space-y-3">
<li><a class="font-body text-[11px] text-on-surface-variant/60 hover:text-primary transition-colors" href="#">About</a></li>
<li><a class="font-body text-[11px] text-on-surface-variant/60 hover:text-primary transition-colors" href="#">Legal</a></li>
</ul>
</div>
<div>
<h4 class="font-headline text-[10px] uppercase tracking-[0.2em] text-on-surface font-bold mb-6">Connect</h4>
<ul class="space-y-3">
<li><a class="font-body text-[11px] text-on-surface-variant/60 hover:text-primary transition-colors" href="#">Help Center</a></li>
<li><a class="font-body text-[11px] text-on-surface-variant/60 hover:text-primary transition-colors" href="#">Contact</a></li>
</ul>
</div>
</div>
</footer>
</body></html>
